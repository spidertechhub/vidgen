<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEO-EDIT // CLOUD STUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffcf54; --box-bg: #ffffff;
            --primary: #ff4757; --secondary: #2ed573; --dark: #1e272e;
            --border: 4px solid #000; --shadow: 8px 8px 0px #000;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif; background-color: var(--bg); color: #000;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 30px 15px; min-height: 100vh;
        }
        .header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 3rem; font-weight: 900; margin: 0; text-transform: uppercase; text-shadow: 3px 3px 0px #fff, 6px 6px 0px #000; letter-spacing: -1px; }
        p.subtitle { font-weight: 700; margin-top: 5px; font-size: 1.1rem; background: #000; color: #fff; display: inline-block; padding: 5px 15px; }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 40px; }
        .studio-box { background: var(--box-bg); border: var(--border); box-shadow: var(--shadow); padding: 30px; }
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-weight: 900; margin-bottom: 8px; text-transform: uppercase; font-size: 1.1rem; }
        .input-wrapper { background: #f1f2f6; border: 3px solid #000; padding: 10px; position: relative; }
        input[type="file"], input[type="url"] { width: 100%; border: none; background: transparent; font-family: inherit; font-size: 1rem; font-weight: 700; outline: none; }
        .hint { display: block; margin-top: 8px; font-size: 0.85rem; font-weight: 700; color: #57606f; }
        button {
            background-color: var(--primary); color: #fff; border: var(--border); box-shadow: 6px 6px 0px #000;
            padding: 18px 20px; font-size: 1.4rem; font-weight: 900; cursor: pointer; width: 100%;
            text-transform: uppercase; font-family: inherit; transition: all 0.1s;
        }
        button:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0px #000; }
        button:active { transform: translate(6px, 6px); box-shadow: 0px 0px 0px #000; }
        button:disabled { background-color: #a4b0be; cursor: not-allowed; transform: translate(6px, 6px); box-shadow: 0px 0px 0px #000; color: #000; }
        .progress-container { display: none; margin-top: 25px; border: 3px solid #000; background: var(--dark); padding: 20px; color: #fff; }
        .progress-text { font-family: monospace; font-size: 1rem; font-weight: bold; margin-bottom: 10px; color: var(--secondary); }
        .progress-bar-wrap { width: 100%; height: 20px; border: 2px solid #fff; position: relative; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.5s ease; }
        .player-container { display: none; margin-top: 30px; border: var(--border); box-shadow: var(--shadow); background: #000; width: 100%; aspect-ratio: 9/16; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .download-btn { display: none; margin-top: 20px; background-color: var(--secondary); color: #000; text-align: center; text-decoration: none; padding: 18px; font-size: 1.4rem; font-weight: 900; border: var(--border); box-shadow: 6px 6px 0px #000; text-transform: uppercase; }
        .download-btn:hover { background-color: #26de81; }
        .history-wrapper { margin-top: 20px; }
        .history-title { font-weight: 900; text-transform: uppercase; font-size: 1.5rem; border-bottom: 4px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        .history-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .history-card { background: #fff; border: 3px solid #000; display: flex; flex-direction: column; box-shadow: 4px 4px 0px #000; }
        .history-card video { width: 100%; aspect-ratio: 9/16; object-fit: cover; border-bottom: 3px solid #000; background: #111; }
        .history-card a { background: #000; color: #fff; text-align: center; padding: 10px; text-decoration: none; font-weight: 900; font-size: 0.9rem; text-transform: uppercase; }
        .history-card a:hover { background: var(--primary); }
        .empty-history { grid-column: 1 / -1; font-weight: 700; font-size: 1.1rem; text-align: center; color: #57606f; padding: 20px; border: 3px dashed #000; }
    </style>
</head>
<body>

    <div class="header">
        <h1>NEO-EDIT</h1>
        <p class="subtitle">CLOUD STUDIO // SUPABASE</p>
    </div>

    <div class="container">
        <div class="studio-box">
            <div class="input-group">
                <label>1. Upload Media</label>
                <div class="input-wrapper"><input type="file" id="mediaUpload" multiple accept="image/*"></div>
                <span class="hint">Images dynamically cut and sync to the audio track.</span>
            </div>
            <div class="input-group">
                <label>2. Facebook Audio URL</label>
                <div class="input-wrapper"><input type="url" id="fbUrl" placeholder="https://www.facebook.com/..."></div>
            </div>

            <button id="renderBtn" type="button">🚀 Generate Video</button>
            
            <div class="progress-container" id="progressUI">
                <div class="progress-text" id="progressText">Initializing Cloud Engine...</div>
                <div class="progress-bar-wrap"><div class="progress-fill" id="progressFill"></div></div>
            </div>

            <div class="player-container" id="playerContainer">
                <video id="finalVideo" controls playsinline></video>
            </div>
            <!-- Opens download in new tab to force download correctly on iOS/Android -->
            <a id="downloadBtn" class="download-btn" target="_blank">⬇️ Download MP4</a>
        </div>

        <div class="history-wrapper">
            <div class="history-title">☁️ Supabase History</div>
            <div class="history-grid" id="historyGrid">
                <div class="empty-history">Connecting to bucket...</div>
            </div>
        </div>
    </div>

    <script>
        const renderBtn = document.getElementById('renderBtn');
        const progressUI = document.getElementById('progressUI');
        const progressText = document.getElementById('progressText');
        const progressFill = document.getElementById('progressFill');
        const playerContainer = document.getElementById('playerContainer');
        const finalVideo = document.getElementById('finalVideo');
        const downloadBtn = document.getElementById('downloadBtn');
        const historyGrid = document.getElementById('historyGrid');

        async function fetchServerHistory() {
            try {
                // Since frontend and backend run on Render, we just use relative paths
                const response = await fetch(`/api/history`);
                const files = await response.json();
                historyGrid.innerHTML = ''; 
                if (files.length === 0) { historyGrid.innerHTML = '<div class="empty-history">No videos in cloud yet.</div>'; return; }

                files.forEach(file => {
                    const card = document.createElement('div');
                    card.className = 'history-card';
                    card.innerHTML = `
                        <!-- Video streams directly from Supabase CDN -->
                        <video src="${file.preview}" controls playsinline preload="metadata"></video>
                        <a href="${file.download}" target="_blank">⬇️ SAVE</a>
                    `;
                    historyGrid.appendChild(card);
                });
            } catch (error) {
                historyGrid.innerHTML = '<div class="empty-history" style="color:var(--primary);">Cloud sync failed.</div>';
            }
        }
        fetchServerHistory();

        let progressInterval;
        function simulateProgress() {
            progressUI.style.display = "block";
            const messages = [
                { w: 10, t: "Extracting Audio Payload..." },
                { w: 30, t: "Plotting Master Timeline..." },
                { w: 50, t: "Rendering Video Frames..." },
                { w: 75, t: "Uploading to Supabase..." },
                { w: 90, t: "Finalizing Cloud Links..." }
            ];
            
            progressFill.style.width = "0%";
            let step = 0;
            progressInterval = setInterval(() => {
                if(step < messages.length) {
                    progressFill.style.width = messages[step].w + "%";
                    progressText.innerText = messages[step].t;
                    step++;
                }
            }, 6000); // Slower progress bar to account for Render's processing speed
        }

        renderBtn.addEventListener('click', async (e) => {
            e.preventDefault(); 
            e.stopPropagation();

            const files = document.getElementById('mediaUpload').files;
            const fbUrl = document.getElementById('fbUrl').value;

            if (files.length === 0 || !fbUrl) { alert("Please provide images and a Facebook URL."); return; }

            renderBtn.disabled = true;
            renderBtn.innerText = "⏳ PROCESSING...";
            playerContainer.style.display = "none";
            downloadBtn.style.display = "none";
            
            simulateProgress();
            
            const formData = new FormData();
            formData.append('url', fbUrl);
            for (let i = 0; i < files.length; i++) { formData.append('images', files[i]); }

            try {
                const response = await fetch(`/api/render`, { method: 'POST', body: formData });
                const data = await response.json();

                if (!response.ok) throw new Error(data.error || "Server failed.");

                clearInterval(progressInterval);
                progressFill.style.width = "100%";
                progressText.innerText = "✅ UPLOAD COMPLETE!";
                progressText.style.color = "#fff";
                
                setTimeout(() => { progressUI.style.display = "none"; }, 3000);

                playerContainer.style.display = "flex";
                finalVideo.src = data.video_url; // Direct Supabase Link
                downloadBtn.style.display = "block";
                downloadBtn.href = data.download_url;

                fetchServerHistory();
            } catch (error) {
                console.error(error);
                clearInterval(progressInterval);
                progressFill.style.width = "100%";
                progressFill.style.backgroundColor = "var(--primary)";
                progressText.innerText = `❌ ERROR: ${error.message}`;
            } finally {
                renderBtn.disabled = false;
                renderBtn.innerText = "🚀 GENERATE NEW VIDEO";
            }
        });
    </script>
</body>
</html>
